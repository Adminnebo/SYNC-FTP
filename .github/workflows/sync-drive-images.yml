name: Sync Drive images to Supabase

# Stateless daily sync from a PUBLIC Google Drive folder to a Supabase bucket:
# lists the folder, lists what already exists in the bucket, uploads only the
# new images. Public folder => a plain Google API key is enough (no service
# account). Schedule is in UTC. 07:30 UTC ≈ 04:30 Argentina. Change the cron
# below to adjust. Also triggerable by hand from the Actions tab.

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  sync-drive:
    runs-on: ubuntu-latest
    # Higher cap for the first bulk load (~4 GB). Daily increments finish fast.
    # The sync is stateless+idempotent, so if a run is cut off it just resumes
    # the missing files on the next run.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci

      - name: Sync Drive
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          # Drive uses its OWN Supabase project (different from the FTP one).
          SUPABASE_URL: ${{ secrets.DRIVE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DRIVE_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.DRIVE_SUPABASE_BUCKET }}
        run: node drive-sync.js
